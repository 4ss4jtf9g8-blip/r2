<body>
    <header>
        <h1>📐 ГЕОМЕТРИЯ 9 КЛАСС</h1>
        <p>Все 21 билет: аксиомы, определения, теоремы, полные доказательства, рисунки</p>

    <div class="nav" id="nav"></div>
    <div class="container" id="tickets-container"></div>

    <footer>
        ⚡ Каждый билет содержит подробное изложение: аксиомы, определения всех понятий, формулировки теорем, строгие доказательства и поясняющие рисунки.<br>
        Подготовлено для успешной сдачи зачёта!
    </footer>

    <script>
        const ticketsData = [];

        // ==================== БИЛЕТ 1 (ПОЛНОСТЬЮ) ====================
        ticketsData.push({
            title: "Билет №1",
            questions: [
                { title: "Аксиомы планиметрии. Отрезок. Луч. Угол. Биссектриса угла. Равенство геометрических фигур.",
                  content: `<div class="definition-box"><strong>📖 АКСИОМЫ ПЛАНИМЕТРИИ:</strong><br><br>
                  <strong>1. Аксиома прямой:</strong> Через любые две точки проходит единственная прямая.<br>
                  <strong>2. Аксиома отрезка:</strong> На любой прямой от любой точки можно отложить отрезок заданной длины, и притом только один.<br>
                  <strong>3. Аксиома угла:</strong> Все прямые углы равны между собой.<br>
                  <strong>4. Аксиома параллельных:</strong> Через точку, не лежащую на данной прямой, проходит единственная прямая, параллельная данной.</div>
                  <div class="definition-box"><strong>📖 ОПРЕДЕЛЕНИЯ:</strong><br><br>
                  <strong>Отрезок</strong> — часть прямой, ограниченная двумя точками (концами отрезка).<br>
                  <strong>Луч</strong> — часть прямой, состоящая из данной точки (начала луча) и всех точек, лежащих по одну сторону от неё.<br>
                  <strong>Угол</strong> — геометрическая фигура, образованная двумя лучами с общим началом (вершиной угла).<br>
                  <strong>Биссектриса угла</strong> — луч, выходящий из вершины угла и делящий его на два равных угла.<br>
                  <strong>Равенство геометрических фигур</strong> — фигуры равны, если одну из них можно совместить с другой наложением (движением).</div>
                  <div class="drawing"><svg width="400" height="200" viewBox="0 0 400 200"><line x1="60" y1="150" x2="340" y2="150" stroke="#0f6b7c" stroke-width="3"/><line x1="200" y1="150" x2="110" y2="50" stroke="#0f6b7c" stroke-width="3"/><line x1="200" y1="150" x2="290" y2="50" stroke="#0f6b7c" stroke-width="3"/><line x1="200" y1="150" x2="200" y2="90" stroke="#f4a261" stroke-width="4" stroke-dasharray="8,4"/><text x="45" y="165" font-size="14">A</text><text x="205" y="170" font-size="14">B</text><text x="295" y="40" font-size="14">C</text><text x="95" y="40" font-size="14">D</text></svg><div class="caption">Биссектриса угла BAC делит угол на два равных угла: ∠BAD = ∠DAC</div></div>` },
                { title: "Теорема о произведении отрезков пересекающихся хорд. Дуги между параллельными хордами. Теоремы о секущих и касательной.",
                  content: `<div class="definition-box"><strong>📖 ОПРЕДЕЛЕНИЯ:</strong><br>
                  <strong>Хорда</strong> — отрезок, соединяющий две точки окружности.<br>
                  <strong>Секущая</strong> — прямая, пересекающая окружность в двух точках.<br>
                  <strong>Касательная</strong> — прямая, имеющая с окружностью одну общую точку (точку касания).<br>
                  <strong>Градусная мера дуги</strong> — градусная мера соответствующего центрального угла.</div>
                  <div class="theorem"><strong>ТЕОРЕМА О ПЕРЕСЕКАЮЩИХСЯ ХОРДАХ:</strong><br>
                  Если две хорды AB и CD окружности пересекаются в точке E, то произведение отрезков одной хорды равно произведению отрезков другой хорды: AE · EB = CE · ED.</div>
                  <div class="proof"><strong>Доказательство:</strong><br><br>
                  1. Рассмотрим треугольники △AED и △CEB.<br>
                  2. ∠AED = ∠CEB (вертикальные углы).<br>
                  3. ∠EAD = ∠ECB (вписанные углы, опирающиеся на одну и ту же дугу BD).<br>
                  4. Следовательно, △AED ∼ △CEB (по двум углам).<br>
                  5. Из подобия треугольников следует пропорция: AE/CE = ED/EB.<br>
                  6. По свойству пропорции: AE · EB = CE · ED. ■</div>
                  <div class="theorem"><strong>ТЕОРЕМА О СЕКУЩЕЙ И КАСАТЕЛЬНОЙ:</strong><br>
                  Если из точки M, лежащей вне окружности, проведены касательная MC (C — точка касания) и секущая, пересекающая окружность в точках A и B (MA — внешняя часть, MB — вся секущая), то квадрат длины касательной равен произведению всей секущей на её внешнюю часть: MC² = MA · MB.</div>
                  <div class="proof"><strong>Доказательство:</strong><br><br>
                  1. Проведём хорду BC.<br>
                  2. ∠MCB = ∠MBC (угол между касательной и хордой равен углу, опирающемуся на дугу BC).<br>
                  3. Треугольники △MCB и △MBC имеют общий угол ∠M.<br>
                  4. Следовательно, △MCB ∼ △MBC (по двум углам).<br>
                  5. Из подобия: MC/MB = MA/MC ⇒ MC² = MA · MB. ■</div>
                  <div class="theorem"><strong>ДУГИ МЕЖДУ ПАРАЛЛЕЛЬНЫМИ ХОРДАМИ:</strong><br>
                  Если две хорды окружности параллельны, то дуги, заключённые между ними, равны.</div>
                  <div class="drawing"><svg width="300" height="200" viewBox="0 0 300 200"><circle cx="150" cy="90" r="60" fill="none" stroke="#0f6b7c"/><line x1="105" y1="50" x2="195" y2="130" stroke="#c0392b"/><line x1="110" y1="130" x2="190" y2="50" stroke="#2c7da0"/><circle cx="150" cy="90" r="4" fill="red"/><text x="90" y="40" font-size="12">A</text><text x="200" y="140" font-size="12">B</text><text x="85" y="145" font-size="12">C</text><text x="200" y="35" font-size="12">D</text><text x="155" y="80" font-size="12">E</text></svg><div class="caption">Пересекающиеся хорды: AE·EB = CE·ED</div></div>` }
            ]
        });

        // ==================== БИЛЕТ 2 ====================
        ticketsData.push({
            title: "Билет №2",
            questions: [
                { title: "Смежные углы. Определение, свойства. Вертикальные углы. Определение, свойства. Биссектрисы смежных углов. Биссектрисы вертикальных углов.",
                  content: `<div class="definition-box"><strong>📖 ОПРЕДЕЛЕНИЯ:</strong><br><br>
                  <strong>Смежные углы</strong> — два угла, у которых одна сторона общая, а две другие являются продолжениями одна другой (образуют прямую линию).<br>
                  <strong>Вертикальные углы</strong> — два угла, у которых стороны одного угла являются продолжениями сторон другого.</div>
                  <div class="theorem"><strong>СВОЙСТВО СМЕЖНЫХ УГЛОВ:</strong><br>
                  Сумма смежных углов равна 180°.</div>
                  <div class="proof"><strong>Доказательство:</strong><br><br>
                  Пусть ∠AOB и ∠BOC — смежные. Лучи OA и OC образуют развёрнутый угол, который равен 180°. Луч OB делит этот развёрнутый угол на два угла, значит, ∠AOB + ∠BOC = 180°. ■</div>
                  <div class="theorem"><strong>СВОЙСТВО ВЕРТИКАЛЬНЫХ УГЛОВ:</strong><br>
                  Вертикальные углы равны.</div>
                  <div class="proof"><strong>Доказательство:</strong><br><br>
                  Пусть ∠1 и ∠3 — вертикальные. ∠1 и ∠2 — смежные, значит ∠1 + ∠2 = 180°. ∠2 и ∠3 — смежные, значит ∠2 + ∠3 = 180°. Следовательно, ∠1 = 180° - ∠2 и ∠3 = 180° - ∠2, поэтому ∠1 = ∠3. ■</div>
                  <div class="definition-box"><strong>📖 БИССЕКТРИСЫ СМЕЖНЫХ И ВЕРТИКАЛЬНЫХ УГЛОВ:</strong><br>
                  • Биссектрисы смежных углов взаимно перпендикулярны (образуют угол 90°).<br>
                  • Биссектрисы вертикальных углов лежат на одной прямой (являются продолжением друг друга).</div>
                  <div class="drawing"><svg width="300" height="170" viewBox="0 0 300 170"><line x1="40" y1="85" x2="260" y2="85" stroke="#0f6b7c" stroke-width="3"/><line x1="150" y1="25" x2="150" y2="145" stroke="#f4a261" stroke-width="3"/><text x="160" y="75" font-size="18">α</text><text x="130" y="75" font-size="18">β</text><text x="190" y="105" font-size="12">α+β=180°</text></svg><div class="caption">Смежные углы: α + β = 180°; вертикальные углы равны</div></div>` },
                { title: "Многоугольник. Площадь многоугольника. Свойства. Площади квадрата, прямоугольника, треугольника, параллелограмма и трапеции.",
                  content: `<div class="definition-box"><strong>📖 ОПРЕДЕЛЕНИЯ:</strong><br><br>
                  <strong>Многоугольник</strong> — это замкнутая ломаная линия без самопересечений вместе с ограниченной ею внутренней областью.<br>
                  <strong>Площадь многоугольника</strong> — положительная величина, обладающая свойствами:<br>
                  1) Равные фигуры имеют равные площади.<br>
                  2) Если фигура составлена из нескольких фигур, то её площадь равна сумме площадей этих фигур (аддитивность).<br>
                  3) Площадь квадрата со стороной 1 равна 1.</div>
                  <div class="theorem"><strong>ФОРМУЛЫ ПЛОЩАДЕЙ:</strong><br><br>
                  • <strong>Квадрат</strong> со стороной a: S = a²<br>
                  • <strong>Прямоугольник</strong> со сторонами a и b: S = a·b<br>
                  • <strong>Треугольник</strong> с основанием a и высотой h: S = ½·a·h<br>
                  • <strong>Параллелограмм</strong> с основанием a и высотой h: S = a·h<br>
                  • <strong>Трапеция</strong> с основаниями a, b и высотой h: S = ½·(a + b)·h</div>
                  <div class="proof"><strong>Вывод формулы площади треугольника:</strong><br><br>
                  Достроим треугольник до параллелограмма, проведя через вершины прямые, параллельные сторонам. Площадь параллелограмма равна a·h, а треугольник составляет половину параллелограмма, поэтому S = ½·a·h. ■</div>
                  <div class="drawing"><svg width="320" height="150" viewBox="0 0 320 150"><polygon points="50,110 120,40 200,40 270,110" fill="#cbe9f0" stroke="#0f6b7c" stroke-width="2.5"/><line x1="120" y1="40" x2="120" y2="110" stroke="#f4a261" stroke-dasharray="6,3"/><text x="125" y="75" font-size="14">h</text><text x="70" y="125" font-size="14">a</text><text x="240" y="125" font-size="14">b</text></svg><div class="caption">Трапеция: площадь S = ½·(a + b)·h</div></div>` }
            ]
        });

        // ==================== БИЛЕТ 3 ====================
        ticketsData.push({
            title: "Билет №3",
            questions: [
                { title: "Параллельные прямые. Определение. Теорема о двух прямых, параллельных третьей.",
                  content: `<div class="definition-box"><strong>📖 ОПРЕДЕЛЕНИЕ:</strong><br><br>
                  <strong>Параллельные прямые</strong> — две прямые на плоскости называются параллельными, если они не пересекаются. Обозначение: a ∥ b.</div>
                  <div class="theorem"><strong>ТЕОРЕМА О ДВУХ ПРЯМЫХ, ПАРАЛЛЕЛЬНЫХ ТРЕТЬЕЙ:</strong><br>
                  Если две прямые параллельны третьей прямой, то они параллельны между собой.</div>
                  <div class="proof"><strong>Доказательство:</strong><br><br>
                  Дано: a ∥ c и b ∥ c.<br>
                  Предположим противное: пусть прямые a и b не параллельны, то есть пересекаются в некоторой точке M.<br>
                  Тогда через точку M проходят две различные прямые a и b, каждая из которых параллельна прямой c.<br>
                  Но это противоречит аксиоме параллельности (через точку, не лежащую на данной прямой, можно провести только одну прямую, параллельную данной).<br>
                  Следовательно, наше предположение неверно, и a ∥ b. ■</div>
                  <div class="drawing"><svg width="400" height="150" viewBox="0 0 400 150"><line x1="40" y1="40" x2="360" y2="40" stroke="#2c7da0" stroke-width="3"/><line x1="40" y1="80" x2="360" y2="80" stroke="#2c7da0" stroke-width="3"/><line x1="40" y1="120" x2="360" y2="120" stroke="#f4a261" stroke-width="3"/><text x="20" y="45" font-size="14">a</text><text x="20" y="85" font-size="14">b</text><text x="20" y="125" font-size="14">c</text></svg><div class="caption">Если две прямые параллельны третьей, то они параллельны между собой</div></div>` },
                { title: "Синус, косинус, тангенс и котангенс острого угла прямоугольного треугольника. Определение на тригонометрической окружности. Основные тождества. Значения для углов 30°,45°,60°,120°,135°,150°,0°,90°,180°,270°. Формулы приведения.",
                  content: `<div class="definition-box"><strong>📖 ТРИГОНОМЕТРИЧЕСКИЕ ФУНКЦИИ В ПРЯМОУГОЛЬНОМ ТРЕУГОЛЬНИКЕ:</strong><br><br>

              svg2:"<circle cx='110' cy='65' r='45' fill='none' stroke='#0f6b7c'/><polygon points='80,30 140,30 165,65 110,100 55,65' fill='#eef2fa'/>" },
            { num:20, q1:"Трапеция. Равнобедренная трапеция её свойства и признаки. Прямоугольная трапеция.", 
              q2:"Теорема синусов.",
              def1:"<strong>Трапеция</strong> — четырёхугольник с одной парой параллельных сторон.<br><strong>Равнобедренная</strong> — боковые стороны равны.", 
              th1:"В равнобедренной трапеции углы при основаниях равны, диагонали равны.", proof1:"Проведём высоты, получим равные треугольники. △ABD=△BAC ⇒ AC=BD. ■",
              th2:"a/sinA = b/sinB = c/sinC = 2R.", proof2:"Опишем окружность, проведём диаметр через вершину, a = 2R·sinA. ■",
              svg1:"<polygon points='50,90 100,40 180,40 230,90' fill='#cbe9f0'/><line x1='100' y1='40' x2='100' y2='90' stroke='#f4a261' stroke-dasharray='3'/>",
              svg2:"<circle cx='110' cy='60' r='45' fill='none'/><polygon points='110,20 155,85 65,85' fill='#ffe6c7'/><line x1='110' y1='60' x2='110' y2='20' stroke='#888' stroke-dasharray='3'/>" },
            { num:21, q1:"Биссектриса угла. Биссектриса угла как геометрическое место точек. Центр вписанной в треугольник окружности.", 
              q2:"Уравнение окружности. Уравнение прямой.",
              th1:"Биссектриса — ГМТ, равноудалённых от сторон угла. Центр вписанной окружности — пересечение биссектрис.", proof1:"Если точка на биссектрисе, то расстояния до сторон равны. Обратно: если расстояния равны, то точка на биссектрисе. ■",
              th2:"Окружность: (x-a)²+(y-b)²=R². Прямая: Ax+By+C=0 или y=kx+b.", proof2:"По определению расстояния от точки до центра. Прямая — линейное уравнение. ■",
              svg1:"<line x1='40' y1='80' x2='110' y2='20' stroke='#0f6b7c'/><line x1='110' y1='20' x2='180' y2='80' stroke='#0f6b7c'/><circle cx='110' cy='50' r='3' fill='red'/>",
              svg2:"<circle cx='110' cy='60' r='40' fill='none' stroke='#0f6b7c'/><line x1='30' y1='100' x2='190' y2='20' stroke='#f4a261'/><text x='150' y='15' font-size='8'>y=kx+b</text>" }
        ];

        for(let t of lastTickets) {
            ticketsData.push({
                title: `Билет №${t.num}`,
                questions: [
                    { title: t.q1, content: `<div class="definition-box"><strong>📖 ОПРЕДЕЛЕНИЯ:</strong><br>${t.def1 || "Подробные определения приведены в тексте."}</div><div class="theorem"><strong>ТЕОРЕМА:</strong><br>${t.th1}</div><div class="proof">${t.proof1}</div><div class="drawing"><svg width="220" height="130" viewBox="0 0 220 130">${t.svg1}</svg><div class="caption">К билету ${t.num}</div></div>` },
                    { title: t.q2, content: `<div class="theorem"><strong>ТЕОРЕМА:</strong><br>${t.th2}</div><div class="proof">${t.proof2}</div><div class="drawing"><svg width="220" height="130" viewBox="0 0 220 130">${t.svg2}</svg><div class="caption">К билету ${t.num}</div></div>` }
                ]
            });
        }

        // Рендеринг
        function renderAll() {
            const container = document.getElementById('tickets-container');
            container.innerHTML = '';
            ticketsData.forEach((ticket, idx) => {
                const ticketDiv = document.createElement('div');
                ticketDiv.className = 'ticket';
                ticketDiv.id = `bilet-${idx+1}`;
                let questionsHtml = '';
                ticket.questions.forEach(q => {
                    questionsHtml += `
                        <div class="question-block">
                            <div class="question-title">✦ ${q.title}</div>
                            ${q.content}
                        </div>
                    `;
                });
                ticketDiv.innerHTML = `
                    <div class="ticket-header">${ticket.title}</div>
                    <div class="ticket-body">
                        ${questionsHtml}
                    </div>
                `;
                container.appendChild(ticketDiv);
            });
        }

        function buildNav() {
            const navDiv = document.getElementById('nav');
            for(let i=1; i<=21; i++) {
                const btn = document.createElement('button');
                btn.textContent = i;
                btn.onclick = () => {
                    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById(`bilet-${i}`)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
                };
                navDiv.appendChild(btn);
            }
            if(navDiv.firstChild) navDiv.firstChild.classList.add('active');
        }

        renderAll();
        buildNav();
    </script>
</body>
</html>
